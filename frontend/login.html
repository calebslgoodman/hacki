<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in — ContentPay</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
        body { display:flex; flex-direction:column; min-height:100vh; }
        .auth-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .auth-card { width:100%; max-width:420px; }
        .auth-title { font-size:26px; font-weight:900; margin-bottom:6px; text-align:center; }
        .auth-sub   { color:var(--muted); font-size:14px; text-align:center; margin-bottom:28px; }
        .input-icon-wrap { position:relative; }
        .show-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--dim);
            font-size: 16px;
            transition: color .15s;
        }
        .show-toggle:hover { color: var(--text); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-logo" style="text-decoration:none">
            <div class="logo-gem">◆</div>
            <span class="logo-text">ContentPay</span>
        </a>
        <div class="navbar-cta">
            <a href="/signup.html" class="btn btn-primary">Get started</a>
        </div>
    </nav>

    <div class="auth-wrap">
        <div class="auth-card">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-sub">Enter your API key to access your dashboard.</p>

            <div class="alert alert-error" id="error-box"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">API Key</label>
                    <div class="input-icon-wrap">
                        <input class="form-input" id="api-key" type="password"
                               placeholder="u_xxxxxxxxxxxxxxxx" required autocomplete="off"
                               style="padding-right:44px; font-family: 'SF Mono','Fira Code',monospace; font-size:13px;" />
                        <button type="button" class="show-toggle" id="show-toggle" onclick="toggleShow()">👁️</button>
                    </div>
                    <p class="form-hint">
                        Demo account: <code style="color:#c4b5fd">user_demo_key</code>
                    </p>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
                    Log in
                </button>
            </form>

            <div class="divider-text">don't have an account?</div>
            <a href="/signup.html" class="btn btn-ghost btn-full">Create account</a>
        </div>
    </div>

    <script>
        const API = 'http://localhost:4000';
        let showKey = false;

        function toggleShow() {
            showKey = !showKey;
            document.getElementById('api-key').type = showKey ? 'text' : 'password';
            document.getElementById('show-toggle').textContent = showKey ? '🙈' : '👁️';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn    = document.getElementById('submit-btn');
            const errBox = document.getElementById('error-box');
            errBox.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Logging in…';

            const apiKey = document.getElementById('api-key').value.trim();

            try {
                const res  = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed.');

                sessionStorage.setItem('cp_token',   data.token);
                sessionStorage.setItem('cp_user_id', data.user_id);
                sessionStorage.setItem('cp_name',    data.name);
                window.location.href = '/dashboard.html';
            } catch (err) {
                errBox.textContent = err.message;
                errBox.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Log in';
            }
        });
    </script>
</body>
</html>
